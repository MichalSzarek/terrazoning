# Alembic configuration for TerraZoning backend.
# DATABASE URL is NOT stored here — it is injected dynamically in alembic/env.py
# from pydantic-settings (reads from environment or .env file).
# Never hardcode credentials here.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template used for generating new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

version_path_separator = os

# sqlalchemy.url is intentionally empty — set programmatically in env.py
sqlalchemy.url =

[post_write_hooks]
# Run ruff formatter on newly generated migration files
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
