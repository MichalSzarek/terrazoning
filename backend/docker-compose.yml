services:
  db:
    image: postgis/postgis:16-3.4
    container_name: terrazoning_db
    environment:
      POSTGRES_USER: terrazoning
      POSTGRES_PASSWORD: terrazoning
      POSTGRES_DB: terrazoning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terrazoning -d terrazoning"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: terrazoning_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@terrazoning.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tools

volumes:
  pgdata:
    driver: local
